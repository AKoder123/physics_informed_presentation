<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlowPitch Web Deck</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header id="topbar" class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <strong id="deckTitle">FlowPitch Deck</strong>
          <span>Editable web presentation</span>
        </div>
      </div>
      <div class="toolbar-actions">
        <button id="presentBtn" type="button">Present</button>
        <button id="exportPdfBtn" type="button">Export PDF</button>
        <button id="downloadJsonBtn" type="button">Download JSON</button>
        <button id="resetDeckBtn" type="button" class="ghost">Reset Deck</button>
      </div>
    </header>

    <main class="editor-layout">
      <aside class="thumb-rail">
        <div class="rail-heading">Slides</div>
        <div id="thumbList" class="thumb-list"></div>
        <div class="slide-tools">
          <button id="addSlideBtn" type="button">Add</button>
          <button id="duplicateSlideBtn" type="button">Duplicate</button>
          <button id="deleteSlideBtn" type="button">Delete</button>
          <button id="moveUpBtn" type="button">Up</button>
          <button id="moveDownBtn" type="button">Down</button>
        </div>
      </aside>

      <section class="editor-stage" aria-label="Editable slide canvas">
        <div id="localWarning" class="local-warning" hidden></div>
        <div class="editor-slide-frame">
          <div id="editorSlide" class="editor-slide-host"></div>
        </div>
      </section>

      <aside class="inspector">
        <label for="slideTypeSelect">Slide type</label>
        <select id="slideTypeSelect">
          <option value="title">Title</option>
          <option value="section">Section</option>
          <option value="content">Content</option>
          <option value="cards">Cards</option>
          <option value="process">Process</option>
          <option value="beforeAfter">Before / After</option>
          <option value="proof">Proof</option>
          <option value="closing">Closing</option>
        </select>
        <label for="speakerNote">Speaker note</label>
        <textarea id="speakerNote" rows="8" placeholder="Speaker notes"></textarea>
        <p class="hint">Click directly on slide text to edit. Changes autosave in this browser.</p>
      </aside>
    </main>
  </div>

  <section id="presentShell" class="present-shell" aria-label="Presentation mode" hidden>
    <div class="present-progress"><span id="presentProgressFill"></span></div>
    <div id="presentStage" class="present-stage"></div>
    <button id="prevBtn" class="present-nav prev" type="button">Prev</button>
    <button id="nextBtn" class="present-nav next" type="button">Next</button>
    <div id="slideCounter" class="slide-counter"></div>
    <button id="exitPresentBtn" class="exit-present" type="button">Exit</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
